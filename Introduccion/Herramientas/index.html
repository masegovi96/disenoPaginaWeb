<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herramientas | Diseño de Página Web</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>

    
    <button class="menu-toggle" id="menu-toggle" aria-label="Abrir o cerrar menú lateral">
        <i class="fa-solid fa-bars"></i>
    </button>

    <div class="app-container">

        
        <aside class="sidebar" id="sidebar"></aside>

        
        <main class="main-content">

            <div class="page-header">
                <h1 class="page-title">Herramientas de la Clase</h1>
            </div>

            
            <div class="info-card">
                <div class="info-card-header">
                    <div class="feature-icon">
                        <i class="fa-brands fa-google"></i>
                    </div>
                    <h2>Google Classroom</h2>
                </div>
                <div class="code-display">
                    <span class="code-label">Código de acceso</span>
                    <span class="code-value">yynd7wxq</span>
                </div>
            </div>

            
            <div class="info-card">
                <div class="info-card-header">
                    <div class="feature-icon">
                        <i class="fa-brands fa-github"></i>
                    </div>
                    <h2>Repositorio de GitHub</h2>
                </div>
                <div class="repo-actions">
                    <span class="repo-link">
                        <i class="fa-solid fa-link"></i>
                        https://github.com/masegovi96/disenoPaginaWeb
                    </span>
                    <button id="qrModalBtn" class="btn-primary">
                        <i class="fa-solid fa-qrcode"></i> Ver código QR
                    </button>
                </div>
            </div>

            
            <div id="qrModal" class="modal">
                <div class="modal-content">
                    <span class="close-modal" id="closeQrModal">&times;</span>
                    <h2>Repositorio de la Clase</h2>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://github.com/masegovi96/disenoPaginaWeb"
                         alt="QR Code del repositorio GitHub"
                         class="modal-qr">
                    <p class="modal-url">
                        https://github.com/masegovi96/disenoPaginaWeb
                    </p>
                </div>
            </div>

            <footer></footer>
        </main>
    </div>

    
    <script src="../../js/components.js"></script>
    
    <script src="../../js/script.js"></script>
</body>
</html>
